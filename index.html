    <style>
$starsTotal: 100;

html {
    box-sizing: border-box;
}

*, *:before, *:after {
    box-sizing: inherit;
}

body {
    background: radial-gradient(#f1f1f1 0%, #1a2238 50%);
    background: #1a2238;
    height: 100vh;
}

.container {
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    height: 100vh;
}

.moon {
    position: relative;
    animation: rotation 60s linear infinite;
    background: #F6EDBD;
    box-shadow: 0 0 5rem .75rem #f6edbd, 0 0 3rem .75rem #ece1a8 inset;
    border-radius: 50%;
    height: 10rem;
    width: 10rem;
}


@for $i from 0 through 7 {
    .crater--#{$i} {
        position: absolute;
        background: #ece1a8;
    }
}

.crater {
    &--0 {
        top: 1.2rem;
        left: 1.4rem;
        border-radius: 42%;
        transform: rotate(-30deg);
        height: 1.1rem;
        width: 3rem;
    }

    &--1 {
        top: 1.6rem;
        left: 1.4rem;
        background: #F6EDBD;
        border-radius: 42%;
        box-shadow: inset -2px 4px 4px 0px #ece1a8;
        transform: rotate(-40deg);
        height: 1.1rem;
        width: 3.7rem;
    }

    &--2 {
        top: 2rem;
        left: 3.2rem;
        border-radius: 48%;
        box-shadow: 0 2px 4px 0px #ece1a8;
        height: 1.9rem;
        width: 2.1rem;
    }

    &--3 {
        top: 1rem;
        left: 4.3rem;
        border-radius: 48%;
        box-shadow: 0 -2px 4px 0px #ece1a8;
        height: 1.6rem;
        width: 2.4rem;
    }

    &--4 {
        top: 5rem;
        left: 0.8rem;
        border-radius: 48%;
        height: 3.6rem;
        width: 5.1rem;
    }

    &--5 {
        top: 5rem;
        left: 0.7rem;
        background: #F6EDBD;
        box-shadow: inset 0 -5px 8px 0px #ece1a8;
        border-radius: 38%;
        transform: rotate(15deg);
        height: 3rem;
        width: 6.4rem;
    }

    &--6 {
        top: 4rem;
        left: 1rem;
        background: #F6EDBD;
        border-radius: 42%;
        height: 3rem;
        width: 3rem;
    }

    &--7 {
        top: 4rem;
        left: 1rem;
        border-radius: 42%;
        box-shadow: 4px 3px 6px 3px #ece1a8;
        height: 3rem;
        width: 3.2rem;
    }
}

@keyframes rotation {
    0% {
        transform: translate(-500%, 100%);
    }
    100% {
        transform: translate(500%, -100%);
    }
}

.sky {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
}

.star {
    position: absolute;
    background-color: #fff;
    border-radius: 50%;
    height: random(2) * 1px;
    width: random(2) * 1px;
}

@for $i from 0 through $starsTotal {
    .star--#{$i} {
        top: random() * 100%;
        left: random() * 100%;
        animation: random(5) * 1s shining (random(50) / 10) * 1s infinite;
    }
}

@keyframes shining {
    0% {
        opacity: 1;
    }
    50% {
        opacity: 0.3;
    }
    100% {
        opacity: 1;
    }
}
h1 {
  text-align: center;
  border: 3px solid green;
}
img {
  display: block;
  margin-left: auto;
  margin-right: auto;
}
</style>
